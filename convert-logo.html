<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Convert logo-dark.svg to PNG</title>
<style>
  body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f3f4f6; margin: 0; gap: 1.5rem; }
  canvas { border: 1px solid #ddd; border-radius: 8px; background: #fff; max-width: 90vw; }
  button { padding: 0.8rem 2rem; background: #FF7A59; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  button:hover { background: #ff8f73; }
  p { color: #6b7280; font-size: 0.9rem; }
</style>
</head>
<body>

<p>Preview of <strong>logo-dark.svg</strong> rendered at 2× resolution:</p>
<canvas id="canvas"></canvas>
<button onclick="download()">Download logo-dark.png</button>
<p>After downloading, place <code>logo-dark.png</code> in <code>c:\wamp64\www\harippc\</code></p>

<script>
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const scale   = 2;          // 2× for retina sharpness
const W       = 760;
const H       = 130;

canvas.width  = W * scale;
canvas.height = H * scale;
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(scale, scale);

const img = new Image();
img.onload = () => {
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(img, 0, 0, W, H);
};
img.src = 'logo-dark.svg';

function download() {
  const a = document.createElement('a');
  a.download = 'logo-dark.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
